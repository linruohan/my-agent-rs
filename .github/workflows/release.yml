name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agent/pyproject.toml

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup and test
        run: |
          bash scripts/setup.sh
          python -m pytest tests/agent -q
        env:
          AGENT_CONFIG_DIR: ${{ github.workspace }}/agent/config
          AGENT_DATA_DIR: ${{ github.workspace }}/data

      - name: Build frontend and sidecar
        run: bash scripts/build.sh --skip-tauri

      - name: Build Tauri bundle
        run: npm run tauri build
        env:
          AGENT_CONFIG_DIR: ${{ github.workspace }}/agent/config
          AGENT_DATA_DIR: ${{ github.workspace }}/data

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: src-tauri/target/release/bundle/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agent/pyproject.toml

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup and test
        run: |
          bash scripts/setup.sh
          python -m pytest tests/agent -q
        env:
          AGENT_CONFIG_DIR: ${{ github.workspace }}/agent/config
          AGENT_DATA_DIR: ${{ github.workspace }}/data

      - name: Build frontend and sidecar
        run: bash scripts/build.sh --skip-tauri

      - name: Build Tauri bundle
        run: npm run tauri build
        env:
          AGENT_CONFIG_DIR: ${{ github.workspace }}/agent/config
          AGENT_DATA_DIR: ${{ github.workspace }}/data

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundle
          path: src-tauri/target/release/bundle/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agent/pyproject.toml

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup and test
        shell: pwsh
        run: |
          ./scripts/setup.ps1
          python -m pytest tests/agent -q
        env:
          AGENT_CONFIG_DIR: ${{ github.workspace }}/agent/config
          AGENT_DATA_DIR: ${{ github.workspace }}/data

      - name: Build frontend and sidecar
        shell: pwsh
        run: ./scripts/build.ps1 -SkipTauri

      - name: Build Tauri bundle
        shell: pwsh
        run: npm run tauri build
        env:
          AGENT_CONFIG_DIR: ${{ github.workspace }}/agent/config
          AGENT_DATA_DIR: ${{ github.workspace }}/data

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: src-tauri/target/release/bundle/
