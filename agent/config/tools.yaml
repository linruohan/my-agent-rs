defaults:
  requires_confirmation_risk: medium

capability:
  web_search:
    enabled: true
    risk: low
    # auto/race = query all free_backends in parallel, first success wins
    backend: race
    free_backends:
      - mojeek
      - bing
      - startpage
      - brave
      - duckduckgo
      - google
    fallback_backends: []
    search_timeout_sec: 15
    # Search region; defaults from app.yaml timezone (Asia/Shanghai -> cn-zh)
    region: cn-zh
    max_results: 5
    allowed_domains: []
  web_fetch:
    enabled: true
    risk: low
    max_chars: 50000
    timeout_sec: 30
  code_execution:
    enabled: true
    risk: high
    requires_confirmation: true
    timeout_sec: 90
    network: false
  text_editor:
    enabled: true
    risk: medium
    workspace: ~/AssistantWorkspace
  bash:
    enabled: true
    risk: high
    requires_confirmation: true
    timeout_sec: 30
    allowed_commands:
      [dir, type, findstr, git, python, echo, cat, ls, grep, find]
  computer:
    enabled: false
    risk: high
    requires_confirmation: true
    allowed_actions: [type, click, scroll]
    pyautogui_pause: 0.05
  tool_search:
    enabled: true
    risk: low
    max_results: 5
  glob:
    enabled: true
    risk: low
    max_results: 200
    timeout_sec: 30
    prefer_fd: true
    exclude_dirs: [.git, node_modules, __pycache__, .venv, target, dist, build]
  grep:
    enabled: true
    risk: low
    max_results: 100
    max_line_length: 500
    timeout_sec: 30
    prefer_rg: true
    exclude_dirs: [.git, node_modules, __pycache__, .venv, target, dist, build]
  list_dir:
    enabled: true
    risk: low
    max_entries: 200
    exclude_dirs: [.git, node_modules, __pycache__, .venv, target, dist, build]
  cli_tools:
    enabled: true
    default_timeout_sec: 60
    max_output_chars: 80000
    default_risk: low

business:
  create_todo:
    enabled: true
    risk: low
  list_todos:
    enabled: true
    risk: low
  update_todo:
    enabled: true
    risk: low
  complete_todo:
    enabled: true
    risk: low
  delete_todo:
    enabled: true
    risk: medium
    requires_confirmation: true
  assign_todo_to_project:
    enabled: true
    risk: low
  set_todo_reminder:
    enabled: true
    risk: low
  create_project:
    enabled: true
    risk: low
  list_projects:
    enabled: true
    risk: low
  update_project:
    enabled: true
    risk: low
  get_project_status:
    enabled: true
    risk: low
  add_project_document:
    enabled: true
    risk: low
  set_project_reminder:
    enabled: true
    risk: low
  read_calendar:
    enabled: true
    risk: low
  create_calendar_event:
    enabled: true
    risk: medium
    requires_confirmation: true
  read_file:
    enabled: true
    risk: low
  write_file:
    enabled: true
    risk: high
    requires_confirmation: true
  search_notes:
    enabled: true
    risk: low
  ingest_notes:
    enabled: true
    risk: low
  read_email:
    enabled: true
    risk: low
  send_email:
    enabled: true
    risk: high
    requires_confirmation: true

mcp_servers:
  github:
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-github"]
    env:
      GITHUB_TOKEN: "${GITHUB_TOKEN}"
    enabled: false
